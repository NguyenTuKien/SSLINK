services:
  database:
    image: postgres:alpine
    restart: always
    ports:
      - "5432:5432"
    volumes:
      - pg_data:/var/lib/postgresql
    env_file: .env
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unipoint-network
  
  redis:
    image: redis:7-alpine
    restart: always
    env_file: .env
    volumes:
      - redis_data:/data
    command: /bin/sh -c 'redis-server --appendonly yes --requirepass "$${REDIS_PASSWORD}"'
    healthcheck:
      test: ["CMD-SHELL", "redis-cli -a \"$${REDIS_PASSWORD}\" ping | grep PONG"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unipoint-network

  rabbitmq:
    image: rabbitmq:3.12-management-alpine
    restart: always
    env_file: .env
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    healthcheck:
      test: rabbitmq-diagnostics -q ping
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unipoint-network

  ai-service:
    build: ./ai-service
    image: ${DOCKER_REGISTRY:-ngtukien218}/ttcs-ai-service:${TAG:-latest}
    restart: always
    env_file:
      - path: .env
        required: false
    environment:
      AI_SERVICE_AUTH_TOKEN: ${AI_FACE_SERVICE_AUTH_TOKEN:-}
      AI_FACE_SERVICE_AUTH_TOKEN: ${AI_FACE_SERVICE_AUTH_TOKEN:-}
      DEEPFACE_MODEL_NAME: ${AI_FACE_MODEL_NAME:-Facenet512}
      DEEPFACE_DETECTOR_BACKEND: ${AI_FACE_DETECTOR_BACKEND:-retinaface}
      DEEPFACE_ENFORCE_DETECTION: ${AI_FACE_ENFORCE_DETECTION:-true}
      DEEPFACE_DISTANCE_THRESHOLD: ${DEEPFACE_DISTANCE_THRESHOLD:-0.4}
      DEEPFACE_FACE_ID_TTL_SECONDS: ${DEEPFACE_FACE_ID_TTL_SECONDS:-900}
      DEEPFACE_MAX_UPLOAD_BYTES: ${AI_FACE_MAX_IMAGE_SIZE_BYTES:-2097152}
      DEEPFACE_MAX_IMAGE_EDGE: ${DEEPFACE_MAX_IMAGE_EDGE:-1600}
      DEEPFACE_WARMUP_ENABLED: ${DEEPFACE_WARMUP_ENABLED:-true}
      DEEPFACE_WARMUP_MODEL_NAME: ${DEEPFACE_WARMUP_MODEL_NAME:-Facenet512}
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/health', timeout=3).read()\""]
      interval: 30s
      timeout: 5s
      retries: 5
      start_period: 30s
    networks:
      - ttcs

  backend:
    build: ./backend
    image: ${DOCKER_REGISTRY:-ghcr.io/nguyentukien}/unipoint-backend:${TAG:-latest}
    restart: always
    env_file: .env
    depends_on:
      database:
        condition: service_healthy
      redis:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
      ai-service:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "wget -qO- http://localhost:8080/api/actuator/health | grep UP" ]
      interval: 30s
      timeout: 10s
      retries: 5
    volumes:
      - logs:/app/logs
    networks:
      - unipoint-network

  frontend:
    build:
      context: ./frontend
      args:
        - VITE_API_PROXY_TARGET=http://backend:8080
    image: ${DOCKER_REGISTRY:-ghcr.io/nguyentukien}/unipoint-frontend:${TAG:-latest}
    restart: always
    ports:
      - "80:80"
    depends_on:
      backend:
        condition: service_healthy
    networks:
      - unipoint-network

  cloudflare:
    image: cloudflare/cloudflared:2026.3.0
    restart: always
    env_file: .env
    command: tunnel --no-autoupdate run --token ${CLOUDFLARE_TUNNEL_TOKEN}
    # depends_on:
    #   - frontend
    networks:
      - unipoint-network

volumes:
  logs:
  pg_data:
  redis_data:
  rabbitmq_data:

networks:
  unipoint-network:
    driver: bridge
  



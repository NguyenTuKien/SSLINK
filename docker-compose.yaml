services:
  database:
    image: postgres:alpine
    restart: always
    # ports:
    #   - "5432:5432"
    volumes:
      - ./database:/var/lib/postgresql/data
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-mydatabase}
      POSTGRES_USER: ${POSTGRES_USER:-myuser}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-mypassword}
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-myuser} -d ${POSTGRES_DB:-mydatabase} -h localhost"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - unipoint
  
  backend:
    build: ./backend
    image: ${DOCKER_REGISTRY:-ngtukien218}/unipoint-backend:${BACKEND_VERSION:-latest}
    restart: always
    # ports:
    #   - "8080:8080"
    env_file:
      - .env
    environment:
      DB_HOST: database
      DB_PORT: 5432
    depends_on:
      database:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 3
    volumes:
      - ./backend/logs:/app/logs
    networks:
      - unipoint

  frontend:
    build: ./frontend
    image: ${DOCKER_REGISTRY:-ngtukien218}/unipoint-frontend:${FRONTEND_VERSION:-latest}
    restart: always
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - unipoint
    
networks:
  unipoint:
    driver: bridge
  



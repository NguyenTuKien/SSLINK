name: Tag Pipeline

on:
  workflow_run:
    workflows: ["Test Pipeline"]
    types:
      - completed
    branches: [ "main", "dev" ]
  push:
    tags: [ "v*" ]

permissions:
  contents: read

jobs:
  tag_job:
    runs-on: ubuntu-latest 
    if: >
      ${{ github.event.workflow_run.conclusion == 'success' || startsWith(github.ref, 'refs/tags/') }}
    outputs:
      docker_tag: ${{ steps.calc_tag.outputs.tag }} 
    steps:
      - name: Tính toán Tag tự động
        id: calc_tag
        run: |
          if [[ "${{ github.event.workflow_run.head_branch }}" == 'main' ]] || [[ "${{ github.ref }}" == 'refs/heads/main' ]]; then
            echo "tag=latest" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event.workflow_run.head_branch }}" == 'dev' ]] || [[ "${{ github.ref }}" == 'refs/heads/dev' ]]; then
            SHORT_SHA=$(echo "${{ github.event.workflow_run.head_sha || github.sha }}" | cut -c1-7)
            echo "tag=$SHORT_SHA" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.ref }}" == refs/tags/* ]]; then
            TAG_NAME=${GITHUB_REF#refs/tags/}
            echo "tag=$TAG_NAME" >> "$GITHUB_OUTPUT"
          fi
